# Production deployment (VPS). Local development does NOT need Docker:
# use `npm run db:dev` + `npm run mail:dev` instead (see README).
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nudoescudo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nudoescudo"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/nudoescudo
      TZ: America/Montevideo
    # Apply migrations + reference seed on every boot (both are idempotent).
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"
    depends_on:
      db:
        condition: service_healthy
    # Published only on localhost: the host's reverse proxy (nginx/caddy)
    # terminates TLS and proxies the subdomain here.
    ports:
      - "127.0.0.1:3000:3000"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/nudoescudo
      TZ: America/Montevideo
      CACHE_DIR: /cache
    command: npm run worker
    volumes:
      - workercache:/cache
    depends_on:
      db:
        condition: service_healthy

  # Nightly pg_dump with rotation (7 daily, 4 weekly, 6 monthly).
  backup:
    image: prodrigestivill/postgres-backup-local:17
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nudoescudo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  workercache:
